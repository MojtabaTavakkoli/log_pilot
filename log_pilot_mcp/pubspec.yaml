name: log_pilot_mcp
description: >
  MCP (Model Context Protocol) server for log_pilot. Exposes runtime log
  state to AI coding agents in Cursor, Claude Code, Windsurf, and
  other MCP-compatible tools.
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  dart_mcp: ^0.5.0
  vm_service: ^15.0.0

dev_dependencies:
  lints: ^5.1.1

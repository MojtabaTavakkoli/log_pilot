name: log_pilot_devtools
description: >
  DevTools extension for log_pilot. Provides a real-time log viewer,
  filters, and export inside the Dart DevTools tab.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  devtools_extensions: ^0.5.0
  devtools_app_shared: ^0.5.0
  vm_service: ^15.0.0

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
